<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights & Ferries | Bozabe Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .tab-active { border-bottom: 3px solid #10b981; color: #064e3b; }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="p-6 bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-emerald-950 font-bold uppercase tracking-tighter text-xl">
                <i data-lucide="arrow-left" class="text-emerald-500"></i> Back to Home
            </a>
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Airlines & Ferries</span>
        </div>
    </nav>

    <!-- HERO -->
    <header class="py-16 px-6 bg-emerald-950 text-white text-center relative overflow-hidden">
        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-5xl font-serif italic mb-4">Fly and Sail</h1>
            <p class="text-emerald-100/70">Competitive rates for all major airlines and ferry lines nationwide.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-12 px-6">
        
        <!-- TAB TOGGLE -->
        <div class="flex justify-center gap-8 mb-12 border-b border-slate-200">
            <button onclick="switchTab('flights')" id="btn-flights" class="pb-4 font-bold uppercase tracking-widest text-sm tab-active transition-all">Flights</button>
            <button onclick="switchTab('ferries')" id="btn-ferries" class="pb-4 font-bold uppercase tracking-widest text-sm text-slate-400 hover:text-emerald-600 transition-all">Ferries</button>
        </div>

        <!-- FLIGHTS FORM -->
        <div id="form-flights" class="bg-white rounded-[2.5rem] p-8 lg:p-12 shadow-2xl border border-slate-100">
            <div class="flex items-center gap-3 mb-10 text-emerald-900">
                <i data-lucide="plane"></i>
                <h2 class="text-2xl font-bold uppercase tracking-tighter">Book a Flight</h2>
            </div>
            <form class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">City/Airport Departure</label>
                    <input type="text" placeholder="Departure Airport" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">City/Airport Arrival</label>
                    <input type="text" placeholder="Arrival Airport" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Departure Date</label>
                    <input type="date" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Arrival Date (Return)</label>
                    <input type="date" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Trip Type</label>
                    <select class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                        <option>Roundtrip</option>
                        <option>One-way</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Adults</label>
                        <input type="number" value="1" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Children</label>
                        <input type="number" value="0" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Full Name</label>
                    <input type="text" placeholder="Enter your name" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="md:col-span-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Email</label>
                    <input type="email" placeholder="E-mail address" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="md:col-span-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Mobile Number</label>
                    <input type="tel" placeholder="Phone number" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="md:col-span-4">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Message</label>
                    <textarea placeholder="Requests / Preferred Flights" rows="3" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                </div>
                <button class="md:col-span-4 bg-emerald-700 text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] hover:bg-emerald-800 transition shadow-xl">Inquire Flight Booking</button>
            </form>
        </div>

        <!-- FERRIES FORM (Hidden by default) -->
        <div id="form-ferries" class="hidden bg-white rounded-[2.5rem] p-8 lg:p-12 shadow-2xl border border-slate-100">
            <div class="flex items-center gap-3 mb-10 text-emerald-900">
                <i data-lucide="ship"></i>
                <h2 class="text-2xl font-bold uppercase tracking-tighter">Book a Ferry</h2>
            </div>
            <form class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">City/Port Departure</label>
                    <input type="text" placeholder="Port of Departure" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">City/Port Arrival</label>
                    <input type="text" placeholder="Port of Arrival" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Departure Date</label>
                    <input type="date" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Arrival Date (Return)</label>
                    <input type="date" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Trip Type</label>
                    <select class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                        <option>Roundtrip</option>
                        <option>One-way</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Adults</label>
                        <input type="number" value="1" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Children</label>
                        <input type="number" value="0" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Full Name</label>
                    <input type="text" placeholder="Enter your name" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="md:col-span-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Email</label>
                    <input type="email" placeholder="E-mail address" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="md:col-span-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Mobile Number</label>
                    <input type="tel" placeholder="Phone number" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="md:col-span-4">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest block mb-1">Message</label>
                    <textarea placeholder="Requests / Preferred Time" rows="3" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                </div>
                <button class="md:col-span-4 bg-emerald-700 text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] hover:bg-emerald-800 transition shadow-xl">Inquire Ferry Booking</button>
            </form>
        </div>

    </main>

    <footer class="py-12 bg-emerald-950 text-white text-center">
        <p class="text-[10px] font-bold text-emerald-800 uppercase tracking-widest italic">© Copyright Bozabe Travel Services. All rights reserved.</p>
    </footer>

    <script>
        lucide.createIcons();

        function switchTab(type) {
            const fForm = document.getElementById('form-flights');
            const sForm = document.getElementById('form-ferries');
            const fBtn = document.getElementById('btn-flights');
            const sBtn = document.getElementById('btn-ferries');

            if(type === 'flights') {
                fForm.classList.remove('hidden');
                sForm.classList.add('hidden');
                fBtn.classList.add('tab-active');
                fBtn.classList.remove('text-slate-400');
                sBtn.classList.remove('tab-active');
                sBtn.classList.add('text-slate-400');
            } else {
                sForm.classList.remove('hidden');
                fForm.classList.add('hidden');
                sBtn.classList.add('tab-active');
                sBtn.classList.remove('text-slate-400');
                fBtn.classList.remove('tab-active');
                fBtn.classList.add('text-slate-400');
            }
        }
    </script>
</body>
</html>
